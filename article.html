<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article — VALENTIN V.</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── VARIABLES ── */
        :root {
            --logo-orange:  #FF8C00;
            --logo-pink:    #FF0080;
            --logo-yellow:  #FFD700;
            --logo-cyan:    #00CFFF;
            --logo-lime:    #AAFF00;
            --logo-purple:  #9B00FF;
            --logo-red:     #FF0000;
            --border-black: 5px solid #000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background-color: #fff; color: #000;
            transition: background-color .3s ease;
            line-height: 1.6; overflow-x: hidden;
        }
        body.dark-mode { background-color: #080808; color: #fff; }

        /* ── BARRE DE LECTURE ── */
        .progress-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 12px;
            z-index: 2000; background: transparent;
        }
        .progress-bar {
            height: 100%; width: 0%; background: var(--logo-lime);
            border-right: 4px solid #000;
        }

        /* ── NAVIGATION ── */
        nav {
            position: sticky; top: 0; z-index: 1000;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; padding: 0 4%; height: 100px;
            background: rgba(255,255,255,.9); backdrop-filter: blur(12px);
            border-bottom: var(--border-black);
        }
        body.dark-mode nav { background: rgba(8,8,8,.9); border-bottom-color: #fff; }

        .nav-logo { height: 75px; width: auto; filter: drop-shadow(4px 4px 0 #000); display: block; margin: 0 auto; }
        .nav-left  { display: flex; justify-content: flex-start; }
        .nav-right { display: flex; justify-content: flex-end; }

        .btn-pop {
            text-decoration: none; font-weight: 900; text-transform: uppercase;
            border: 3px solid #000; border-radius: 12px;
            padding: 12px 24px; cursor: pointer; font-family: 'Poppins', sans-serif;
            font-size: .85rem;
            transition: all .2s cubic-bezier(.34,1.56,.64,1);
        }
        .back-btn { background: #fff; color: #000; box-shadow: 4px 4px 0 #000; }
        .back-btn:hover { transform: translate(-4px,-4px); box-shadow: 8px 8px 0 var(--logo-cyan); }

        .dark-btn { background: #000; color: #fff; box-shadow: 4px 4px 0 var(--logo-orange); }
        .dark-btn:hover { transform: translate(-4px,-4px); box-shadow: 8px 8px 0 var(--logo-yellow); }

        body.dark-mode .dark-btn { background: #fff; color: #000; border-color: #fff; box-shadow: 4px 4px 0 var(--logo-yellow); }
        body.dark-mode .back-btn { background: #111; color: #fff; border-color: #fff; box-shadow: 4px 4px 0 #fff; }

        /* ── HERO ARTICLE ── */
        .article-hero {
            position: relative; width: 100%; height: 75vh; min-height: 550px;
            display: flex; align-items: flex-end; padding-bottom: 80px;
        }
        .hero-bg {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2000') center/cover;
            z-index: 1; filter: brightness(0.8);
        }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,1), transparent); z-index: 2; }

        .hero-content { position: relative; z-index: 10; width: 90%; max-width: 1100px; margin: 0 auto; }

        .category-sticker {
            background: var(--logo-yellow); color: #000;
            padding: 12px 30px; font-weight: 900; text-transform: uppercase;
            border: 4px solid #000; display: inline-block; margin-bottom: 25px;
            box-shadow: 7px 7px 0 #000;
            font-size: 1.1rem; letter-spacing: 2px;
            border-radius: 4px;
            cursor: default;
            transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
        }
        .category-sticker:hover {
            transform: translate(-3px,-3px);
            box-shadow: 10px 10px 0 var(--logo-pink);
        }

        .article-title {
            font-size: clamp(2.5rem, 10vw, 5.5rem); font-weight: 900; line-height: 0.9;
            color: #fff; text-transform: uppercase; margin: 0;
            text-shadow:
                8px 8px 0 var(--logo-pink),
                12px 12px 0 rgba(255,0,128,.35);
            -webkit-text-stroke: 3px #000;
            paint-order: stroke fill;
        }

        /* ── CORPS DE L'ARTICLE ── */
        .article-container { max-width: 850px; margin: 60px auto; padding: 0 25px; }

        .meta-info {
            display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 50px; font-weight: 900;
            text-transform: uppercase; border-bottom: 5px solid var(--logo-cyan); padding-bottom: 15px;
        }

        .article-body p { font-size: 1.35rem; margin-bottom: 2.5rem; }

        .article-body p:first-of-type::first-letter {
            float: left; font-size: 6.5rem; line-height: 0.7; font-weight: 900;
            padding: 15px 15px 0 0; color: var(--logo-orange); text-shadow: 6px 6px 0 #000;
        }

        blockquote {
            margin: 60px 0;
            padding: 40px;
            background: var(--logo-purple);
            color: #fff;
            border: var(--border-black);
            border-radius: 25px;
            font-size: 2.2rem;
            font-weight: 900;
            line-height: 1.1;
            box-shadow: 15px 15px 0 var(--logo-yellow);
            transform: rotate(-1deg);
        }
        body.dark-mode blockquote {
            box-shadow: 15px 15px 0 var(--logo-cyan);
        }

        /* ── SECTION PARTAGE ── */
        .share-box {
            margin: 100px auto; padding: 60px 40px;
            background: #fff; border: var(--border-black);
            border-radius: 40px; text-align: center;
            box-shadow: 20px 20px 0 var(--logo-pink);
        }
        body.dark-mode .share-box { background: #111; border-color: #fff; box-shadow: 20px 20px 0 var(--logo-purple); }

        .share-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }

        .share-btn {
            padding: 15px 35px; color: #fff; font-size: 1.2rem;
            box-shadow: 6px 6px 0 #000;
        }
        .share-btn:hover { transform: translate(-5px,-5px); }
        .s-x    { background: #000; }
        .s-x:hover    { box-shadow: 11px 11px 0 #888; }
        .s-fb   { background: #1877F2; }
        .s-fb:hover   { box-shadow: 11px 11px 0 var(--logo-cyan); }
        .s-link { background: var(--logo-orange); color: #fff; }
        .s-link:hover { box-shadow: 11px 11px 0 var(--logo-yellow); }

        .adsense-box {
            max-width: 900px; margin: 30px auto; padding: 15px;
            border: 3px dashed #ccc; border-radius: 15px;
            text-align: center; color: #aaa; font-weight: 900; font-size: 0.8rem;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            nav { height: 80px; grid-template-columns: auto 1fr auto; padding: 0 3%; }
            .nav-logo { height: 50px; }
            .btn-pop { font-size: .78rem; padding: 10px 16px; }
            .article-hero { height: 55vh; min-height: 380px; padding-bottom: 40px; }
            .article-title { font-size: 3rem; -webkit-text-stroke: 2px #000; }
            .category-sticker { font-size: 0.9rem; padding: 8px 15px; }
            blockquote { margin: 40px 0; font-size: 1.5rem; padding: 30px; border-radius: 24px; }
            .article-container { padding: 0 20px; margin: 40px auto; }
            .share-box { padding: 40px 20px; border-radius: 24px; }
            .share-box h2 { font-size: 1.5rem; }
            .share-btn { padding: 12px 22px; font-size: 1rem; }
        }

        @media (max-width: 480px) {
            :root { --border-black: 3px solid #000; }

            nav { height: 60px; padding: 0 12px; gap: 8px; }
            .nav-logo { height: 38px; }
            .btn-pop { font-size: .72rem; padding: 8px 12px; border-radius: 10px; border-width: 2px; }
            .back-btn { box-shadow: 3px 3px 0 #000; }
            .dark-btn { box-shadow: 3px 3px 0 var(--logo-orange); }

            .progress-container { height: 6px; }

            .article-hero { height: 48vh; min-height: 280px; padding-bottom: 28px; }
            .article-title {
                font-size: clamp(1.8rem, 8vw, 2.6rem);
                -webkit-text-stroke: 1.5px #000;
                text-shadow: 4px 4px 0 var(--logo-pink), 6px 6px 0 rgba(255,0,128,.3);
            }
            .category-sticker {
                font-size: .78rem; padding: 6px 12px;
                border-width: 2px; box-shadow: 4px 4px 0 #000;
                margin-bottom: 14px;
            }

            .article-container { padding: 0 16px; margin: 28px auto; }
            .meta-info { gap: 10px; margin-bottom: 28px; font-size: .85rem; }
            .article-body p { font-size: 1.1rem; margin-bottom: 1.8rem; }
            .article-body p:first-of-type::first-letter {
                font-size: 4.5rem; padding: 10px 10px 0 0;
            }

            blockquote {
                margin: 30px 0; padding: 22px 20px;
                font-size: 1.15rem; border-radius: 16px;
                box-shadow: 10px 10px 0 var(--logo-yellow);
                transform: none;
            }

            .share-box {
                margin: 50px auto; padding: 28px 16px;
                border-radius: 20px;
                box-shadow: 10px 10px 0 var(--logo-pink);
            }
            .share-box h2 { font-size: 1.3rem; }
            .share-grid { flex-direction: column; gap: 12px; align-items: stretch; }
            .share-btn {
                padding: 14px 20px; font-size: .95rem;
                text-align: center; box-shadow: 4px 4px 0 #000;
            }

            .adsense-box { margin: 16px auto; padding: 10px; font-size: .72rem; }
        }
    </style>
</head>
<body>

<div class="progress-container">
    <div class="progress-bar" id="readingProgress"></div>
</div>

<!-- NAVIGATION -->
<nav>
    <div class="nav-left">
        <a href="https://valentinvmedia.github.io/valentinvmedia/" class="btn-pop back-btn"><span>← Accueil</span></a>
    </div>
    <div class="nav-center" style="display:flex;justify-content:center;align-items:center;">
        <a href="https://valentinvmedia.github.io/valentinvmedia/"><img src="logo-valentin.png" alt="VALENTIN V." class="nav-logo"></a>
    </div>
    <div class="nav-right">
        <button class="btn-pop dark-btn" id="dark-toggle">Mode Sombre</button>
    </div>
</nav>

<div class="adsense-box">
    <!-- Remplacer par votre code Google AdSense -->
    Publicité AdSense
</div>

<header class="article-hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <div class="category-sticker" id="artCategory">Chargement…</div>
        <h1 class="article-title" id="artTitle">Chargement…</h1>
    </div>
</header>

<main class="article-container">
    <div class="meta-info">
        <span id="artAuthor">✍️ Par …</span>
        <span id="artDate">📅 --/--/----</span>
        <span id="artReadTime">⏱️ – min de lecture</span>
    </div>

    <section class="article-body" id="artContent"></section>

    <!-- SECTION PARTAGE -->
    <section class="share-box">
        <h2 style="font-weight:900;text-transform:uppercase;margin:0;font-size:2rem;">Partager l'article</h2>
        <div class="share-grid">
            <a href="#" id="shareX"  target="_blank" class="btn-pop share-btn s-x">X (Twitter)</a>
            <a href="#" id="shareFB" target="_blank" class="btn-pop share-btn s-fb">Facebook</a>
            <button onclick="copyLink()" id="copyBtn" class="btn-pop share-btn s-link">Copier le lien</button>
        </div>
    </section>
</main>

<div class="adsense-box">
    <!-- Remplacer par votre code Google AdSense -->
    Publicité AdSense
</div>

<script>
    // ── DARK MODE ──
    const darkBtn = document.getElementById('dark-toggle');
    darkBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        darkBtn.textContent = document.body.classList.contains('dark-mode') ? 'Mode Clair' : 'Mode Sombre';
    });

    // ── BARRE DE PROGRESSION ──
    window.onscroll = function () {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById('readingProgress').style.width = (winScroll / height * 100) + '%';
    };

    // ── PARTAGE ──
    function setupSharing() {
        const url   = encodeURIComponent(window.location.href);
        const title = encodeURIComponent(document.getElementById('artTitle').innerText);
        document.getElementById('shareX').href  = `https://twitter.com/intent/tweet?text=${title}&url=${url}`;
        document.getElementById('shareFB').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerText = 'Copié ! ✅';
            btn.style.background = 'var(--logo-lime)';
            btn.style.color = '#000';
            setTimeout(() => {
                btn.innerText = 'Copier le lien';
                btn.style.background = 'var(--logo-orange)';
                btn.style.color = '#fff';
            }, 2000);
        });
    }

    // ── SANITY — FETCH ARTICLE ──
    const slug = new URLSearchParams(window.location.search).get('s');

    if (slug) {
        const QUERY = encodeURIComponent(
            `*[_type == "post" && slug.current == "${slug}"][0]{
                title,
                "imageUrl": mainImage.asset->url,
                publishedAt,
                "categories": categories[]->title,
                "author": author->name,
                body
            }`
        );
        const API_URL = `https://jf7j0hvz.api.sanity.io/v2021-10-21/data/query/production?query=${QUERY}`;

        fetch(API_URL)
            .then(r => r.json())
            .then(data => {
                const a = data.result;
                if (!a) return;

                // Titre
                document.getElementById('artTitle').innerText = a.title || '';
                document.title = (a.title || 'Article') + ' — VALENTIN V.';

                // Image hero
                if (a.imageUrl) {
                    document.getElementById('heroBg').style.backgroundImage = `url('${a.imageUrl}')`;
                }

                // Catégories (toutes, séparées par " · ")
                const sticker = document.getElementById('artCategory');
                if (a.categories && a.categories.length > 0) {
                    sticker.innerText = a.categories.join(' · ');
                } else {
                    sticker.innerText = 'Reportage';
                }

                // Auteur
                document.getElementById('artAuthor').innerText = '✍️ Par ' + (a.author || 'Valentin V.');

                // Date
                if (a.publishedAt) {
                    document.getElementById('artDate').innerText = '📅 ' + new Date(a.publishedAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
                }

                // Corps de l'article (Portable Text → HTML)
                if (a.body) {
                    let wordCount = 0;
                    a.body.forEach(block => {
                        if (block._type === 'block') {
                            const text = (block.children || []).map(c => c.text || '').join('');
                            wordCount += text.split(/\s+/).filter(Boolean).length;
                        }
                    });

                    document.getElementById('artContent').innerHTML = a.body.map(block => {
                        if (block._type !== 'block') return '';
                        const text = (block.children || []).map(c => c.text || '').join('');
                        if (!text.trim()) return '';
                        if (block.style === 'blockquote') return `<blockquote>"${text}"</blockquote>`;
                        if (block.style === 'h2') return `<h2 style="font-size:2rem;font-weight:900;text-transform:uppercase;margin:60px 0 20px;">${text}</h2>`;
                        if (block.style === 'h3') return `<h3 style="font-size:1.5rem;font-weight:900;text-transform:uppercase;margin:40px 0 15px;">${text}</h3>`;
                        return `<p>${text}</p>`;
                    }).join('');

                    // Temps de lecture estimé
                    const minutes = Math.max(1, Math.round(wordCount / 200));
                    document.getElementById('artReadTime').innerText = `⏱️ ${minutes} min de lecture`;
                }

                setupSharing();
            })
            .catch(err => {
                console.error('Erreur Sanity :', err);
                document.getElementById('artTitle').innerText = 'Erreur de chargement';
            });
    } else {
        // Pas de slug — affichage par défaut (preview)
        document.getElementById('artCategory').innerText = 'Reportage';
        document.getElementById('artTitle').innerText = "L'information n'a jamais été aussi brute.";
        document.getElementById('artContent').innerHTML = `
            <p>Bienvenue dans cet article de fond. L'objectif ici est de vous proposer une immersion totale.</p>
            <blockquote>"Le journalisme moderne doit être aussi impactant visuellement que par ses mots."</blockquote>
            <p>Lorsque vous intégrerez Sanity, vous pourrez faire varier la couleur du sticker de catégorie.</p>
        `;
        setupSharing();
    }

    window.onload = setupSharing;
</script>
</body>
</html>
